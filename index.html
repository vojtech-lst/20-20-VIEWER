<!DOCTYPE html>
<html>
<head>
    <title>Minimal 3D Viewer Test</title>
    <script type="importmap">
      { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.166.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.0/examples/jsm/"
      }}
    </script>
    <style>
        body { margin: 0; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; display: block; }
        #fileInput { position: absolute; top: 10px; left: 10px; z-index: 10; }
    </style>
</head>
<body>
    <input type="file" id="fileInput" accept=".3dm">
    <canvas id="viewer"></canvas>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Rhino3dmLoader } from 'three/addons/loaders/3DMLoader.js';

        // Setup scene
        const canvas = document.getElementById('viewer');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(100, 100, 100);
        
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(1, 1, 1);
        scene.add(dirLight);

        const loader = new Rhino3dmLoader();
        loader.setLibraryPath('https://cdn.jsdelivr.net/npm/rhino3dm@8.4.0/');

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            alert('File selected! Loading model...');
            const file = e.target.files[0];
            if (!file) return;
            const buffer = await file.arrayBuffer();
            
            loader.parse(buffer, (object) => {
                scene.add(object);
                // Auto-fit camera
                const box = new THREE.Box3().setFromObject(object);
                const center = box.getCenter(new THREE.Vector3());
                camera.lookAt(center);
                controls.target.copy(center);
                alert('Model loaded!');
            }, (error) => {
                console.error(error);
                alert('Error loading model: ' + error.message);
            });
        });
    </script>
</body>
</html>
